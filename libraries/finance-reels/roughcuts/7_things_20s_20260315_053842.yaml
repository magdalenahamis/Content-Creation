    duration: "00:00:03.27"
    dialogue: >
      4. Daily coffee runs. Make it at home for 25 cents.
    visual_description: >
      Same shot continues. Woman delivers tip four directly to camera.

  - clip_number: 6
    source_file: "03DAAF0C-4E2D-40AA-BFE5-E1638D132E64.mp4"
