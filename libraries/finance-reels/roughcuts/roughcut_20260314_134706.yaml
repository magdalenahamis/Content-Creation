    dialogue: >
      Seven things to never spend your money on in your 20s if you don't want to go broke in your 30s.
      1. Gambling, specifically sports betting. If you're going to gamble, just day trade, at least you'll learn something.
      2. Expensive pets. Dogs and cats are way more expensive than people think. They are literally like kids. If you don't have the time or money, skip it.
      3. Eating out every day. It adds up faster than you think.
      4. Daily coffee runs. Make it at home for 25 cents.
      5. Brand new car. It loses half of its value in the first few years. Get a beater and invest in the difference.
      6. Design and clothes. Gucci Louis Vuitton. None of this is worth it in your 20s.
      7. Speeding tickets. I paid almost 200 for one. I drive like a grandma right now.
      I don't hate spending money. I just hate spending money on things that don't make sense.
      If you think I missed something, drop it in the comments and follow for more money content.
